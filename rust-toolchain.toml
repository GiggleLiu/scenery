# Pins the toolchain so the committed wyckoff-io wasm blob rebuilds deterministically.
# CI enforces byte-identity (see .github/workflows/ci.yml, "Verify wasm blob is
# reproducible"): the committed wyckoff/plugin/wyckoff_io.wasm must match a fresh
# build under exactly this toolchain. Bump `channel` only alongside a rebuilt blob.
[toolchain]
channel = "1.93.1"
targets = ["wasm32-unknown-unknown"]
components = ["rustfmt"]
