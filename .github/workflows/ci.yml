name: CI
on:
  push: {branches: [main]}
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [scenery, wyckoff, brillouin]
    env:
      # Resolve @preview/<pkg>:<version> imports to the local checkout.
      TYPST_PACKAGE_PATH: ${{ github.workspace }}/_pkgroot
    steps:
      - uses: actions/checkout@v4
      - uses: typst-community/setup-typst@v4
        with: {typst-version: '0.14.2'}
      - name: Build local @preview package tree
        run: make pkgroot
      - name: Check markdown links
        if: matrix.package == 'scenery'
        run: make check-links
      - name: Install Rust wasm target
        if: matrix.package == 'wyckoff'
        run: rustup target add wasm32-unknown-unknown
      - name: Build wyckoff-io plugin
        if: matrix.package == 'wyckoff'
        run: make -C wyckoff plugin
      # Reproducible-build gate: rust-toolchain.toml pins the exact rustc, so a
      # fresh `make -C wyckoff plugin` must byte-match the committed blob. A diff
      # here means the checked-in wyckoff_io.wasm drifted from its pinned source
      # (rebuild + recommit to fix).
      - name: Verify wasm blob is reproducible
        if: matrix.package == 'wyckoff'
        run: git diff --exit-code wyckoff/plugin/wyckoff_io.wasm
      - name: Run wyckoff-io parser tests
        if: matrix.package == 'wyckoff'
        run: cargo test --manifest-path wyckoff-io/Cargo.toml
      - name: Run tests
        run: make -C ${{ matrix.package }} test
      - name: Compile examples
        run: make -C ${{ matrix.package }} examples
      # The manual compiles on every PR and push as a test (its figures exercise
      # the whole public API); it is only uploaded as an artifact on main.
      - name: Compile manual (scenery)
        if: matrix.package == 'scenery'
        run: make -C scenery manual
      - name: Upload manual PDF
        if: matrix.package == 'scenery' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: scenery-manual
          path: scenery/manual.pdf
