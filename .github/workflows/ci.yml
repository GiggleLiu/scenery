name: CI
on:
  push: {branches: [main]}
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [scenery, wyckoff]
    env:
      # Resolve @preview/<pkg>:<version> imports to the local checkout.
      TYPST_PACKAGE_PATH: ${{ github.workspace }}/_pkgroot
    steps:
      - uses: actions/checkout@v4
      - uses: typst-community/setup-typst@v4
        with: {typst-version: '0.14.2'}
      - name: Build local @preview package tree
        run: make pkgroot
      - name: Run tests
        run: make -C ${{ matrix.package }} test
      - name: Compile examples
        run: make -C ${{ matrix.package }} examples
