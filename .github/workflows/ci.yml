name: CI
on:
  push: {branches: [main]}
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [scenery, materia]
    env:
      # Resolve @preview/<pkg>:<version> imports to the local checkout.
      TYPST_PACKAGE_PATH: ${{ github.workspace }}/_pkgroot
    steps:
      - uses: actions/checkout@v4
      - uses: typst-community/setup-typst@v4
        with: {typst-version: '0.15.0'}
      - name: Build local @preview package tree
        run: make pkgroot
      - name: Check markdown links
        if: matrix.package == 'scenery'
        run: make check-links
      - name: Install Rust wasm target
        if: matrix.package == 'materia' || matrix.package == 'scenery'
        run: rustup target add wasm32-unknown-unknown
      # Rebuild the plugin fresh (rust-toolchain.toml pins rustc) and run the
      # typst suite against THIS build, so stale or broken Rust source is caught
      # functionally by the import tests that exercise parse_xyz/poscar/cif.
      # NB: a byte-for-byte `git diff` gate against the committed blob is not used
      # here — wasm output is not reproducible across host OS (the blob is
      # committed from macOS; CI runs on ubuntu). A true byte-repro gate needs a
      # pinned build container; tracked as a follow-up.
      - name: Build materia-io plugin
        if: matrix.package == 'materia'
        run: make -C materia plugin
      - name: Run materia-io parser tests
        if: matrix.package == 'materia'
        run: cargo test --manifest-path materia-io/Cargo.toml
      # Same functional-gate pattern as materia-io (see the note above): rebuild
      # the engine fresh and run scenery's typst suite (test-engine.typ + the
      # equivalence gates) against this build.
      - name: Build scenery-engine plugin
        if: matrix.package == 'scenery'
        run: make -C scenery plugin
      - name: Run scenery-engine tests
        if: matrix.package == 'scenery'
        run: cargo test --manifest-path scenery-engine/Cargo.toml
      - name: Run tests
        run: make -C ${{ matrix.package }} test
      - name: Compile examples
        run: make -C ${{ matrix.package }} examples
      # The manual compiles on every PR and push as a test (its figures exercise
      # the whole public API); it is only uploaded as an artifact on main.
      - name: Compile manual (scenery)
        if: matrix.package == 'scenery'
        run: make -C scenery manual
      - name: Upload manual PDF
        if: matrix.package == 'scenery' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: scenery-manual
          path: scenery/manual.pdf
