name: CI
on:
  push: {branches: [main]}
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: typst-community/setup-typst@v4
        with: {typst-version: '0.14.2'}
      - run: make test
      - run: |
          for f in examples/*.typ; do typst compile --root . "$f" "/tmp/$(basename "${f%.typ}").png"; done
